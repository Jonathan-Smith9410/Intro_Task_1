apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        # Ensure this builds inside minikube first
        image: my-flask-app:latest 
        imagePullPolicy: Never 
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: "mongodb://database:27017/"
---
apiVersion: v1
kind: Service
metadata:
  name: webapp # Matches the 'webapp' hostname in the Nginx config
spec:
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000